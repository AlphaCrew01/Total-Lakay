<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion des Produits - Total Lakay</title>
  
  <!-- Favicon -->
  <link rel="icon" href="logo.jpeg" type="image/jpeg">
  
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  
  <!-- Main Styles -->
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* ============================================
       PRODUCT MANAGEMENT SPECIFIC STYLES
       ============================================ */
    
    .pm-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .pm-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .pm-header h1 {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--blue-deep);
      margin: 0;
    }

    .pm-toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pm-search {
      flex: 1;
      min-width: 250px;
    }

    .pm-search input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid var(--gray-300);
      border-radius: 12px;
      font-size: 1rem;
      transition: var(--transition);
    }

    .pm-search input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(200, 150, 62, 0.1);
    }

    .pm-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .pm-stat-card {
      background: var(--white);
      padding: 25px;
      border-radius: 15px;
      box-shadow: var(--shadow-md);
      border-left: 4px solid var(--gold);
      transition: var(--transition);
    }

    .pm-stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .pm-stat-value {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--blue-deep);
      margin: 10px 0;
    }

    .pm-stat-label {
      color: var(--text-soft);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .pm-main-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 30px;
      margin-bottom: 30px;
    }

    @media (max-width: 1024px) {
      .pm-main-grid {
        grid-template-columns: 1fr;
      }
    }

    .pm-sidebar {
      background: var(--white);
      border-radius: 15px;
      padding: 25px;
      box-shadow: var(--shadow-md);
      height: fit-content;
    }

    .pm-section-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--blue-deep);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pm-form-group {
      margin-bottom: 18px;
    }

    .pm-form-group label {
      display: block;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .pm-form-group input,
    .pm-form-group select,
    .pm-form-group textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid var(--gray-300);
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      transition: var(--transition);
      background: var(--white);
      color: var(--text-main);
    }

    .pm-form-group input:focus,
    .pm-form-group select:focus,
    .pm-form-group textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(200, 150, 62, 0.1);
    }

    .pm-form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .pm-image-upload {
      border: 2px dashed var(--gold);
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      background: rgba(200, 150, 62, 0.05);
    }

    .pm-image-upload:hover {
      border-color: var(--gold-light);
      background: rgba(200, 150, 62, 0.1);
    }

    .pm-image-upload.dragover {
      border-color: var(--gold-bright);
      background: rgba(200, 150, 62, 0.15);
    }

    .pm-image-upload-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: var(--gold);
    }

    .pm-image-upload-text {
      color: var(--text-soft);
      font-weight: 600;
    }

    .pm-image-previews {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .pm-image-preview {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 1;
      background: var(--gray-100);
    }

    .pm-image-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .pm-image-preview-close {
      position: absolute;
      top: 5px;
      right: 5px;
      background: rgba(239, 68, 68, 0.9);
      color: white;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .pm-image-preview-close:hover {
      background: var(--danger);
    }

    .pm-button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .pm-btn {
      flex: 1;
      padding: 15px 20px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .pm-btn-primary {
      background: var(--gold-gradient);
      color: var(--blue-deep);
    }

    .pm-btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: var(--shadow-gold);
    }

    .pm-btn-secondary {
      background: var(--gray-200);
      color: var(--blue-deep);
    }

    .pm-btn-secondary:hover:not(:disabled) {
      background: var(--gray-300);
    }

    .pm-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .pm-products-list {
      background: var(--white);
      border-radius: 15px;
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .pm-products-header {
      background: var(--blue-deep);
      color: white;
      padding: 20px;
      display: grid;
      grid-template-columns: 60px 1fr 100px 100px 100px 80px;
      gap: 15px;
      align-items: center;
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .pm-products-header {
        display: none;
      }
    }

    .pm-product-row {
      padding: 20px;
      border-bottom: 1px solid var(--gray-200);
      display: grid;
      grid-template-columns: 60px 1fr 100px 100px 100px 80px;
      gap: 15px;
      align-items: center;
      transition: var(--transition);
    }

    .pm-product-row:hover {
      background: var(--gray-100);
    }

    @media (max-width: 768px) {
      .pm-product-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }
    }

    .pm-product-image {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--gray-100);
    }

    .pm-product-name {
      font-weight: 700;
      color: var(--blue-deep);
    }

    .pm-product-stock {
      text-align: center;
    }

    .pm-product-stock.low {
      color: var(--danger);
      font-weight: 700;
    }

    .pm-product-stock.ok {
      color: var(--success);
      font-weight: 700;
    }

    .pm-product-price {
      text-align: right;
      font-weight: 700;
      color: var(--gold);
    }

    .pm-product-actions {
      display: flex;
      gap: 5px;
    }

    .pm-product-btn {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: var(--transition);
    }

    .pm-product-btn-edit {
      background: var(--blue-light);
      color: white;
    }

    .pm-product-btn-edit:hover {
      background: var(--blue-medium);
    }

    .pm-product-btn-delete {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }

    .pm-product-btn-delete:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    .pm-loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .pm-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--gray-300);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .pm-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      border-bottom: 2px solid var(--gray-200);
    }

    .pm-tab {
      padding: 15px 20px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 700;
      color: var(--text-soft);
      transition: var(--transition);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }

    .pm-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .pm-tab:hover {
      color: var(--blue-deep);
    }

    .pm-tab-content {
      display: none;
    }

    .pm-tab-content.active {
      display: block;
    }

    .pm-category-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pm-category-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gray-100);
      padding: 10px 15px;
      border-radius: 20px;
      color: var(--text-main);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .pm-category-badge:hover {
      background: var(--gold);
      color: var(--blue-deep);
    }

    .pm-category-badge.selected {
      background: var(--gold);
      color: var(--blue-deep);
    }

    .pm-filter-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .pm-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 5000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .pm-modal.active {
      display: flex;
    }

    .pm-modal-content {
      background: var(--white);
      border-radius: 20px;
      max-width: 90vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-xl);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(40px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .pm-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px;
      border-bottom: 2px solid var(--gray-200);
      background: var(--blue-deep);
      color: white;
    }

    .pm-modal-header h2 {
      margin: 0;
      font-size: 1.5rem;
    }

    .pm-modal-close {
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .pm-modal-close:hover {
      transform: rotate(90deg);
    }

    .pm-modal-body {
      padding: 30px;
    }

    .pm-toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--success);
      color: white;
      padding: 16px 24px;
      border-radius: 10px;
      box-shadow: var(--shadow-xl);
      font-weight: 600;
      z-index: 6000;
      animation: slideIn 0.3s ease-out;
    }

    .pm-toast.error {
      background: var(--danger);
    }

    .pm-toast.warning {
      background: var(--warning);
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .pm-empty-state {
      text-align: center;
      padding: 60px 30px;
      color: var(--text-soft);
    }

    .pm-empty-state-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .pm-empty-state-text {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .pm-upload-progress {
      display: none;
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--white);
      border-radius: 15px;
      padding: 20px;
      box-shadow: var(--shadow-xl);
      min-width: 300px;
      z-index: 6000;
    }

    .pm-upload-progress.active {
      display: block;
    }

    .pm-progress-bar {
      width: 100%;
      height: 8px;
      background: var(--gray-300);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 10px;
    }

    .pm-progress-fill {
      height: 100%;
      background: var(--gold-gradient);
      transition: width 0.3s ease;
    }
  </style>
</head>
<body data-page-role="admin">
  <!-- Navigation -->
  <header class="navbar">
    <div class="logo-area">
      <img src="logo.jpeg" alt="Total Lakay" class="logo-img" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="logo-icon-fallback">TL</div>
      <div class="logo-text">
        Total Lakay
        <small>Gestion des Produits</small>
      </div>
    </div>
    <nav class="nav-links">
      <button id="backToAdmin" class="btn btn-outline btn-sm">← Retour Admin</button>
      <button id="logoutBtn" class="btn btn-outline btn-sm">🚪 Déconnexion</button>
    </nav>
  </header>

  <!-- Main Content -->
  <div class="pm-container">
    <!-- Header -->
    <div class="pm-header">
      <h1>📦 Gestion des Produits</h1>
      <div class="pm-toolbar">
        <div class="pm-search">
          <input type="text" id="pmSearch" placeholder="🔍 Rechercher un produit...">
        </div>
        <button id="pmAddNewBtn" class="btn btn-gold">➕ Nouveau Produit</button>
      </div>
    </div>

    <!-- Statistics -->
    <div class="pm-stats" id="pmStats">
      <!-- Populated by JavaScript -->
    </div>

    <!-- Main Content Area -->
    <div class="pm-main-grid">
      <!-- Sidebar - Add/Edit Product Form -->
      <div class="pm-sidebar" id="pmSidebar">
        <h3 class="pm-section-title">📝 <span id="pmFormTitle">Ajouter un Produit</span></h3>
        
        <form id="pmProductForm">
          <!-- Basic Info -->
          <div class="pm-form-group">
            <label>Nom du Produit *</label>
            <input type="text" id="pmName" placeholder="Ex: Riz blanc premium" required>
          </div>

          <div class="pm-form-group">
            <label>Description</label>
            <textarea id="pmDescription" placeholder="Décrivez votre produit..."></textarea>
          </div>

          <div class="pm-form-group">
            <label>Catégorie *</label>
            <select id="pmCategory" required>
              <option value="">Choisir une catégorie</option>
              <option value="clothing">👕 Vêtements & Accessoires</option>
              <option value="school">🎓 École & Travail</option>
              <option value="home">🏠 Maison & Personnel</option>
              <option value="electronics">📱 Électronique</option>
            </select>
          </div>

          <!-- Pricing -->
          <div class="pm-form-group">
            <label>Prix (HTG) *</label>
            <input type="number" id="pmPrice" placeholder="250" min="0" step="0.01" required>
          </div>

          <div class="pm-form-group">
            <label>Ancien Prix (Promo)</label>
            <input type="number" id="pmOldPrice" placeholder="300" min="0" step="0.01">
          </div>

          <!-- Stock -->
          <div class="pm-form-group">
            <label>Stock *</label>
            <input type="number" id="pmStock" placeholder="0" min="0" required>
          </div>

          <!-- Variants -->
          <div class="pm-form-group">
            <label>Couleurs (séparées par virgule)</label>
            <input type="text" id="pmColors" placeholder="Ex: rouge, bleu, noir">
          </div>

          <div class="pm-form-group">
            <label>Tailles (séparées par virgule)</label>
            <input type="text" id="pmSizes" placeholder="Ex: S, M, L, XL">
          </div>

          <!-- Images -->
          <div class="pm-form-group">
            <label>Images du Produit (JPG, PNG, WEBP - Max 5MB chacune)</label>
            <div class="pm-image-upload" id="pmImageDrop">
              <div class="pm-image-upload-icon">📸</div>
              <div class="pm-image-upload-text">Cliquez ou glissez des images ici</div>
            </div>
            <div class="pm-image-previews" id="pmImagePreviews"></div>
          </div>

          <!-- Form Actions -->
          <div class="pm-button-group">
            <button type="submit" id="pmSubmitBtn" class="pm-btn pm-btn-primary">
              <span id="pmSubmitText">➕ Ajouter Produit</span>
            </button>
            <button type="reset" class="pm-btn pm-btn-secondary">🔄 Réinitialiser</button>
          </div>
        </form>
      </div>

      <!-- Products List -->
      <div>
        <div class="pm-tabs">
          <button class="pm-tab active" data-tab="all">Tous les Produits</button>
          <button class="pm-tab" data-tab="lowstock">Stock Faible ⚠️</button>
          <button class="pm-tab" data-tab="promo">Promotions 🔥</button>
        </div>

        <div class="pm-tab-content active" id="pmAllProducts">
          <!-- Populated by JavaScript -->
        </div>

        <div class="pm-tab-content" id="pmLowstockProducts">
          <!-- Populated by JavaScript -->
        </div>

        <div class="pm-tab-content" id="pmPromoProducts">
          <!-- Populated by JavaScript -->
        </div>
      </div>
    </div>
  </div>

  <!-- Upload Progress -->
  <div class="pm-upload-progress" id="pmUploadProgress">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
      <span id="pmUploadText">Téléchargement en cours...</span>
      <span id="pmUploadPercent">0%</span>
    </div>
    <div class="pm-progress-bar">
      <div class="pm-progress-fill" id="pmProgressFill"></div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="pmToastContainer"></div>

  <!-- Confirmation Modal -->
  <div class="pm-modal" id="pmConfirmModal">
    <div class="pm-modal-content" style="max-width: 400px;">
      <div class="pm-modal-header">
        <h2>Confirmation</h2>
        <button class="pm-modal-close" onclick="document.getElementById('pmConfirmModal').classList.remove('active')">&times;</button>
      </div>
      <div class="pm-modal-body">
        <p id="pmConfirmText"></p>
        <div class="pm-button-group">
          <button class="pm-btn pm-btn-primary" id="pmConfirmBtn">✅ Confirmer</button>
          <button class="pm-btn pm-btn-secondary" onclick="document.getElementById('pmConfirmModal').classList.remove('active')">❌ Annuler</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/pica/dist/pica.js"></script>
  <script src="products-manager.js" defer></script>
</body>
</html>
