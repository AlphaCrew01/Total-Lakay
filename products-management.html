<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion des Produits - Total Lakay</title>

  <link rel="icon" href="logo.jpeg" type="image/jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <!-- Firebase — SANS firebase-storage (on utilise Supabase) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <!-- ❌ PAS de firebase-storage-compat.js ici -->

  <link rel="stylesheet" href="style.css">

  <style>
    /* ============================================
       PRODUCT MANAGER — STYLES
       ============================================ */

    :root {
      --pm-radius: 14px;
      --pm-shadow: 0 4px 24px rgba(0,0,0,0.08);
      --pm-shadow-lg: 0 8px 40px rgba(0,0,0,0.13);
      --pm-transition: 0.2s cubic-bezier(.4,0,.2,1);
    }

    * { box-sizing: border-box; }

    .pm-container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* ── HEADER ── */
    .pm-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .pm-header h1 {
      font-size: 2rem;
      font-weight: 900;
      color: var(--blue-deep);
      margin: 0;
    }

    .pm-toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pm-search {
      position: relative;
    }

    .pm-search input {
      padding: 11px 16px 11px 40px;
      border: 2px solid var(--gray-300);
      border-radius: var(--pm-radius);
      font-family: inherit;
      font-size: 0.97rem;
      min-width: 260px;
      transition: var(--pm-transition);
      background: var(--white);
      color: var(--text-main);
    }

    .pm-search input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(200,150,62,0.12);
    }

    .pm-search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-soft);
      pointer-events: none;
      font-size: 0.9rem;
    }

    /* ── STATS ── */
    .pm-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .pm-stat-card {
      background: var(--white);
      padding: 22px 20px;
      border-radius: var(--pm-radius);
      box-shadow: var(--pm-shadow);
      border-left: 4px solid var(--gold);
      transition: var(--pm-transition);
    }

    .pm-stat-card:hover { transform: translateY(-3px); box-shadow: var(--pm-shadow-lg); }
    .pm-stat-card.warning { border-left-color: #f59e0b; }
    .pm-stat-card.danger  { border-left-color: #ef4444; }
    .pm-stat-card.promo   { border-left-color: #10b981; }

    .pm-stat-value {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--blue-deep);
      margin: 8px 0 2px;
      line-height: 1;
    }

    .pm-stat-card.warning .pm-stat-value { color: #d97706; }
    .pm-stat-card.danger  .pm-stat-value { color: #ef4444; }
    .pm-stat-card.promo   .pm-stat-value { color: #059669; }

    .pm-stat-label {
      color: var(--text-soft);
      font-weight: 600;
      font-size: 0.88rem;
    }

    /* ── LAYOUT ── */
    .pm-main-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 28px;
      align-items: start;
    }

    @media (max-width: 1100px) {
      .pm-main-grid { grid-template-columns: 1fr; }
    }

    /* ── SIDEBAR / FORM ── */
    .pm-sidebar {
      background: var(--white);
      border-radius: var(--pm-radius);
      padding: 26px;
      box-shadow: var(--pm-shadow);
      position: sticky;
      top: 90px;
    }

    .pm-section-title {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--blue-deep);
      margin: 0 0 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pm-form-group {
      margin-bottom: 16px;
    }

    .pm-form-group label {
      display: block;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .pm-form-group label .req {
      color: #ef4444;
      margin-left: 2px;
    }

    .pm-form-group input,
    .pm-form-group select,
    .pm-form-group textarea {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid var(--gray-300);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.97rem;
      transition: var(--pm-transition);
      background: var(--white);
      color: var(--text-main);
    }

    .pm-form-group input:focus,
    .pm-form-group select:focus,
    .pm-form-group textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(200,150,62,0.12);
    }

    .pm-form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .pm-form-group textarea {
      resize: vertical;
      min-height: 90px;
    }

    /* ── IMAGE DROP ── */
    .pm-image-drop {
      border: 2px dashed var(--gold);
      border-radius: 12px;
      padding: 26px 16px;
      text-align: center;
      cursor: pointer;
      transition: var(--pm-transition);
      background: rgba(200,150,62,0.04);
      user-select: none;
    }

    .pm-image-drop:hover,
    .pm-image-drop.dragover {
      border-color: var(--gold-light, #e6b84a);
      background: rgba(200,150,62,0.1);
    }

    .pm-image-drop-icon { font-size: 2rem; color: var(--gold); margin-bottom: 6px; }
    .pm-image-drop-text { color: var(--text-soft); font-size: 0.88rem; font-weight: 600; }
    .pm-image-drop-sub  { color: var(--text-soft); font-size: 0.78rem; margin-top: 4px; }

    /* ── IMAGE PREVIEWS ── */
    .pm-image-previews {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .pm-image-preview {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 1;
      background: var(--gray-100);
      border: 2px solid transparent;
    }

    .pm-image-preview.existing { border-color: var(--gold); }
    .pm-image-preview.new      { border-color: #10b981; }

    .pm-image-preview img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .pm-image-preview-close {
      position: absolute;
      top: 4px; right: 4px;
      background: rgba(239,68,68,0.92);
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px; height: 24px;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--pm-transition);
      line-height: 1;
    }

    .pm-image-preview-close:hover { background: #dc2626; transform: scale(1.1); }

    .pm-img-badge {
      position: absolute;
      bottom: 4px; left: 4px;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      letter-spacing: 0.03em;
    }

    .pm-img-badge.new-badge { background: rgba(16,185,129,0.85); }

    .pm-img-count {
      grid-column: 1 / -1;
      font-size: 0.8rem;
      color: var(--text-soft);
      margin: 4px 0 0;
      font-style: italic;
    }

    /* ── BUTTONS ── */
    .pm-button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .pm-btn {
      flex: 1;
      padding: 13px 18px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: var(--pm-transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .pm-btn-primary {
      background: var(--gold-gradient, linear-gradient(135deg, #c8963e, #e6b84a));
      color: var(--blue-deep, #0f2744);
    }

    .pm-btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(200,150,62,0.4);
    }

    .pm-btn-warning {
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      color: #1a1a1a;
    }

    .pm-btn-warning:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(245,158,11,0.35);
    }

    .pm-btn-secondary {
      background: var(--gray-200, #e5e7eb);
      color: var(--blue-deep, #0f2744);
    }

    .pm-btn-secondary:hover:not(:disabled) { background: var(--gray-300, #d1d5db); }

    .pm-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }

    /* ── TABS ── */
    .pm-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--gray-200);
      overflow-x: auto;
    }

    .pm-tab {
      padding: 12px 18px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 700;
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text-soft);
      transition: var(--pm-transition);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
    }

    .pm-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .pm-tab:hover:not(.active) { color: var(--blue-deep); }

    .pm-tab-content { display: none; }
    .pm-tab-content.active { display: block; }

    /* ── PRODUCT TABLE ── */
    .pm-results-subtitle {
      font-size: 0.85rem;
      color: var(--text-soft);
      margin-bottom: 12px;
      font-style: italic;
    }

    .pm-products-list {
      background: var(--white);
      border-radius: var(--pm-radius);
      box-shadow: var(--pm-shadow);
      overflow: hidden;
    }

    .pm-products-header {
      background: var(--blue-deep, #0f2744);
      color: white;
      padding: 14px 20px;
      display: grid;
      grid-template-columns: 68px 1fr 110px 80px 110px 90px;
      gap: 12px;
      align-items: center;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    @media (max-width: 800px) { .pm-products-header { display: none; } }

    .pm-product-row {
      padding: 14px 20px;
      border-bottom: 1px solid var(--gray-200);
      display: grid;
      grid-template-columns: 68px 1fr 110px 80px 110px 90px;
      gap: 12px;
      align-items: center;
      transition: var(--pm-transition);
    }

    .pm-product-row:last-child { border-bottom: none; }
    .pm-product-row:hover { background: rgba(200,150,62,0.04); }

    @media (max-width: 800px) {
      .pm-product-row {
        grid-template-columns: 60px 1fr auto;
        grid-template-rows: auto auto auto;
      }
    }

    .pm-product-img-wrap {
      position: relative;
      width: 60px; height: 60px;
      flex-shrink: 0;
    }

    .pm-product-image {
      width: 60px; height: 60px;
      border-radius: 10px;
      object-fit: cover;
      background: var(--gray-100);
      border: 2px solid var(--gray-200);
    }

    .pm-img-count-badge {
      position: absolute;
      bottom: -4px; right: -4px;
      background: var(--gold);
      color: #fff;
      font-size: 0.62rem;
      font-weight: 800;
      padding: 1px 5px;
      border-radius: 8px;
    }

    .pm-product-name {
      font-weight: 700;
      color: var(--blue-deep);
      font-size: 0.95rem;
      margin-bottom: 3px;
    }

    .pm-product-desc {
      font-size: 0.8rem;
      color: var(--text-soft);
    }

    .pm-product-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }

    .pm-tag {
      font-size: 0.72rem;
      padding: 2px 7px;
      border-radius: 6px;
      background: var(--gray-100);
      color: var(--text-soft);
      font-weight: 600;
    }

    .pm-product-price-col { text-align: right; }

    .pm-product-price {
      font-weight: 800;
      color: var(--gold);
      font-size: 1rem;
    }

    .pm-product-old-price {
      font-size: 0.78rem;
      color: var(--text-soft);
      text-decoration: line-through;
    }

    .pm-discount-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 6px;
      background: #fef3c7;
      color: #92400e;
      margin-top: 3px;
    }

    .pm-product-stock {
      text-align: center;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .pm-product-stock.ok  { color: #059669; }
    .pm-product-stock.low { color: #d97706; }
    .pm-product-stock.out { color: #ef4444; }

    .pm-cat-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--gray-100);
      color: var(--blue-deep);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: capitalize;
    }

    .pm-product-actions { display: flex; gap: 6px; justify-content: center; }

    .pm-product-btn {
      padding: 8px 11px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: var(--pm-transition);
      line-height: 1;
    }

    .pm-product-btn-edit   { background: rgba(15,39,68,0.1); }
    .pm-product-btn-edit:hover { background: rgba(15,39,68,0.2); transform: scale(1.1); }

    .pm-product-btn-delete { background: rgba(239,68,68,0.1); }
    .pm-product-btn-delete:hover { background: rgba(239,68,68,0.2); transform: scale(1.1); }

    /* ── EMPTY / LOADING ── */
    .pm-empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-soft);
    }

    .pm-empty-state-icon  { font-size: 3rem; margin-bottom: 12px; }
    .pm-empty-state-text  { font-size: 1rem; font-weight: 600; }

    .pm-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 50px;
      font-weight: 600;
      color: var(--text-soft);
    }

    .pm-spinner {
      width: 36px; height: 36px;
      border: 4px solid var(--gray-300);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PROGRESS ── */
    .pm-upload-progress {
      display: none;
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--white);
      border-radius: var(--pm-radius);
      padding: 18px 22px;
      box-shadow: var(--pm-shadow-lg);
      min-width: 280px;
      z-index: 6000;
      border-left: 4px solid var(--gold);
    }

    .pm-upload-progress.active { display: block; animation: slideInRight .3s ease; }

    .pm-progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-weight: 600;
      font-size: 0.88rem;
    }

    .pm-progress-bar {
      width: 100%; height: 7px;
      background: var(--gray-200);
      border-radius: 4px;
      overflow: hidden;
    }

    .pm-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #e6b84a);
      transition: width 0.3s ease;
      border-radius: 4px;
    }

    /* ── TOAST ── */
    #pmToastContainer {
      position: fixed;
      bottom: 28px; right: 28px;
      z-index: 7000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .pm-toast {
      background: #1e3a5f;
      color: white;
      padding: 14px 20px;
      border-radius: 12px;
      box-shadow: var(--pm-shadow-lg);
      font-weight: 600;
      font-size: 0.92rem;
      animation: slideInRight 0.3s ease;
      pointer-events: auto;
      max-width: 320px;
      border-left: 4px solid var(--gold);
    }

    .pm-toast.success { border-left-color: #10b981; background: #064e3b; }
    .pm-toast.error   { border-left-color: #ef4444; background: #7f1d1d; }
    .pm-toast.warning { border-left-color: #f59e0b; background: #78350f; }
    .pm-toast.info    { border-left-color: #3b82f6; background: #1e3a5f; }

    .pm-toast.fade-out {
      animation: slideOutRight 0.35s ease forwards;
    }

    @keyframes slideInRight {
      from { transform: translateX(120%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    @keyframes slideOutRight {
      from { transform: translateX(0);    opacity: 1; }
      to   { transform: translateX(120%); opacity: 0; }
    }

    /* ── MODAL ── */
    .pm-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 5000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(2px);
    }

    .pm-modal.active { display: flex; }

    .pm-modal-content {
      background: var(--white);
      border-radius: 18px;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--pm-shadow-lg);
      animation: slideUp 0.28s ease;
      overflow: hidden;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .pm-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 26px;
      background: var(--blue-deep, #0f2744);
      color: white;
    }

    .pm-modal-header h2 { margin: 0; font-size: 1.2rem; }

    .pm-modal-close {
      background: none; border: none;
      color: white; font-size: 1.4rem;
      cursor: pointer; transition: var(--pm-transition);
      line-height: 1;
    }

    .pm-modal-close:hover { transform: rotate(90deg); }

    .pm-modal-body { padding: 26px; }
    .pm-modal-body p { margin: 0 0 20px; line-height: 1.6; color: var(--text-main); }

    /* ── SCROLLBAR ── */
    .pm-sidebar::-webkit-scrollbar { width: 5px; }
    .pm-sidebar::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }
  </style>
</head>
<body data-page-role="admin">

  <!-- Navigation -->
  <header class="navbar">
    <div class="logo-area">
      <img src="logo.jpeg" alt="Total Lakay" class="logo-img" loading="lazy"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="logo-icon-fallback">TL</div>
      <div class="logo-text">
        Total Lakay
        <small>Gestion des Produits</small>
      </div>
    </div>
    <nav class="nav-links">
      <button id="backToAdmin" class="btn btn-outline btn-sm">← Retour Admin</button>
      <button id="logoutBtn" class="btn btn-outline btn-sm">🚪 Déconnexion</button>
    </nav>
  </header>

  <!-- Main -->
  <div class="pm-container">

    <!-- Header -->
    <div class="pm-header">
      <h1>📦 Gestion des Produits</h1>
      <div class="pm-toolbar">
        <div class="pm-search">
          <i class="fas fa-search pm-search-icon"></i>
          <input type="text" id="pmSearch" placeholder="Rechercher un produit...">
        </div>
        <button id="pmAddNewBtn" class="btn btn-gold">➕ Nouveau Produit</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="pm-stats" id="pmStats">
      <div class="pm-stat-card">
        <div class="pm-stat-label">📦 Total Produits</div>
        <div class="pm-stat-value">—</div>
      </div>
    </div>

    <!-- Main Grid -->
    <div class="pm-main-grid">

      <!-- ── SIDEBAR FORM ── -->
      <div class="pm-sidebar" id="pmSidebar">
        <h3 class="pm-section-title">📝 <span id="pmFormTitle">Ajouter un Produit</span></h3>

        <form id="pmProductForm" novalidate>

          <div class="pm-form-group">
            <label>Nom du Produit <span class="req">*</span></label>
            <input type="text" id="pmName" placeholder="Ex: Robe en lin bleue" autocomplete="off">
          </div>

          <div class="pm-form-group">
            <label>Description</label>
            <textarea id="pmDescription" placeholder="Décrivez le produit..."></textarea>
          </div>

          <div class="pm-form-group">
            <label>Catégorie <span class="req">*</span></label>
            <select id="pmCategory">
              <option value="">— Choisir —</option>
              <option value="clothing">👕 Vêtements &amp; Accessoires</option>
              <option value="school">🎓 École &amp; Travail</option>
              <option value="home">🏠 Maison &amp; Personnel</option>
              <option value="electronics">📱 Électronique</option>
            </select>
          </div>

          <div class="pm-form-grid-2">
            <div class="pm-form-group">
              <label>Prix (HTG) <span class="req">*</span></label>
              <input type="number" id="pmPrice" placeholder="250" min="0" step="1">
            </div>
            <div class="pm-form-group">
              <label>Ancien Prix</label>
              <input type="number" id="pmOldPrice" placeholder="350" min="0" step="1">
            </div>
          </div>

          <div class="pm-form-group">
            <label>Stock <span class="req">*</span></label>
            <input type="number" id="pmStock" placeholder="0" min="0" step="1">
          </div>

          <div class="pm-form-grid-2">
            <div class="pm-form-group">
              <label>Couleurs</label>
              <input type="text" id="pmColors" placeholder="rouge, bleu, noir">
            </div>
            <div class="pm-form-group">
              <label>Tailles</label>
              <input type="text" id="pmSizes" placeholder="S, M, L, XL">
            </div>
          </div>

          <!-- Images -->
          <div class="pm-form-group">
            <label>Images <small style="color:var(--text-soft);font-weight:400;">(JPG/PNG/WEBP · max 8 MB · 6 max)</small></label>
            <div class="pm-image-drop" id="pmImageDrop">
              <div class="pm-image-drop-icon">📸</div>
              <div class="pm-image-drop-text">Cliquez ou glissez vos images ici</div>
              <div class="pm-image-drop-sub">JPEG · PNG · WEBP — Compressées automatiquement</div>
            </div>
            <div class="pm-image-previews" id="pmImagePreviews"></div>
          </div>

          <!-- Actions -->
          <div class="pm-button-group">
            <button type="button" id="pmSubmitBtn" class="pm-btn pm-btn-primary">
              <span id="pmSubmitText">➕ Ajouter Produit</span>
            </button>
            <!-- type="button" pour éviter reset natif -->
            <button type="button" id="pmCancelBtn" class="pm-btn pm-btn-secondary">🔄 Annuler</button>
          </div>

        </form>
      </div>

      <!-- ── PRODUCTS LIST ── -->
      <div>
        <div class="pm-tabs">
          <button class="pm-tab active" data-tab="all">Tous les Produits</button>
          <button class="pm-tab" data-tab="lowstock">⚠️ Stock Faible</button>
          <button class="pm-tab" data-tab="outofstock">🔴 Rupture</button>
          <button class="pm-tab" data-tab="promo">🔥 Promos</button>
        </div>

        <div class="pm-tab-content active" id="pmAllProducts">
          <div class="pm-loading"><span class="pm-spinner"></span> Chargement...</div>
        </div>
        <div class="pm-tab-content" id="pmLowstockProducts"></div>
        <div class="pm-tab-content" id="pmOutofstockProducts"></div>
        <div class="pm-tab-content" id="pmPromoProducts"></div>
      </div>
    </div>
  </div>

  <!-- Upload Progress -->
  <div class="pm-upload-progress" id="pmUploadProgress">
    <div class="pm-progress-header">
      <span id="pmUploadText">Chargement...</span>
      <span id="pmUploadPercent">0%</span>
    </div>
    <div class="pm-progress-bar">
      <div class="pm-progress-fill" id="pmProgressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="pmToastContainer"></div>

  <!-- Confirm Modal -->
  <div class="pm-modal" id="pmConfirmModal">
    <div class="pm-modal-content">
      <div class="pm-modal-header">
        <h2>⚠️ Confirmation</h2>
        <button class="pm-modal-close" id="pmConfirmClose">&times;</button>
      </div>
      <div class="pm-modal-body">
        <p id="pmConfirmText">Êtes-vous sûr ?</p>
        <div class="pm-button-group">
          <button class="pm-btn pm-btn-primary" id="pmConfirmBtn">✅ Confirmer</button>
          <button class="pm-btn pm-btn-secondary" id="pmConfirmCancel">❌ Annuler</button>
        </div>
      </div>
    </div>
  </div>

  <!-- JS — firebase-storage PAS inclus -->
  <script src="products-manager.js" defer></script>
</body>
</html>
