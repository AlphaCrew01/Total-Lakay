<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 400" width="400" height="400" style="background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cbd5e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond principal -->
  <rect width="400" height="400" fill="url(#iconGradient)"/>
  
  <!-- Cadre décoratif -->
  <rect x="30" y="30" width="340" height="340" fill="none" stroke="#e2e8f0" stroke-width="3" rx="20"/>
  
  <!-- Icône caméra brisée -->
  <g transform="translate(200, 200)">
    <!-- Cadre de la caméra -->
    <rect x="-60" y="-50" width="120" height="100" fill="none" stroke="white" stroke-width="3" rx="8"/>
    
    <!-- Objectif -->
    <circle cx="0" cy="0" r="25" fill="none" stroke="white" stroke-width="3"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="white" stroke-width="2"/>
    
    <!-- Flash -->
    <rect x="40" y="-40" width="12" height="12" fill="white" rx="2"/>
    
    <!-- Ligne de rupture diagonale -->
    <line x1="-80" y1="-80" x2="80" y2="80" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Texte -->
  <text x="200" y="350" font-family="Poppins, sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#64748b">
    Image non disponible
  </text>
</svg>